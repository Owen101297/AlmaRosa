kind = "web"
previewPath = "/"
title = "Alma Rosa - Lencería"
version = "1.0.0"
id = "artifacts/karen-guerrero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23620

[services.development]
run = "pnpm --filter @workspace/karen-guerrero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/karen-guerrero", "run", "build" ]
publicDir = "artifacts/karen-guerrero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23620"
BASE_PATH = "/"
